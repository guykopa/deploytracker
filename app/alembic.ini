[alembic]
script_location = alembic
prepend_sys_path = src
file_template = %%(rev)s_%%(slug)s
timezone = UTC

# Database URL is loaded from Settings in env.py; this placeholder is overridden there.
sqlalchemy.url = postgresql+psycopg2://deploytracker:deploytracker@localhost:5432/deploytracker

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
