name: Deploy

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]

permissions:
  id-token: write
  contents: read

jobs:
  build-and-push:
    name: Build and push to ECR
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    outputs:
      image-tag: ${{ steps.meta.outputs.version }}

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::378202225330:role/deploytracker-github-actions
          aws-region: eu-west-3

      - name: Ensure ECR repository exists
        run: |
          aws ecr describe-repositories --repository-names deploytracker --region eu-west-3 2>/dev/null || \
          aws ecr create-repository \
            --repository-name deploytracker \
            --region eu-west-3 \
            --image-scanning-configuration scanOnPush=true \
            --image-tag-mutability MUTABLE

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: 378202225330.dkr.ecr.eu-west-3.amazonaws.com/deploytracker
          tags: |
            type=sha,format=short
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: app
          push: true
          platforms: linux/amd64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to K3s
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::378202225330:role/deploytracker-github-actions
          aws-region: eu-west-3

      - name: Fetch kubeconfig from SSM
        run: |
          aws ssm get-parameter \
            --name /deploytracker/kubeconfig \
            --with-decryption \
            --query Parameter.Value \
            --output text > /tmp/kubeconfig
          echo "KUBECONFIG=/tmp/kubeconfig" >> $GITHUB_ENV

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Deploy
        run: |
          helm upgrade --install deploytracker charts/deploytracker \
            --namespace deploytracker --create-namespace \
            --set image.tag=${{ needs.build-and-push.outputs.image-tag }} \
            --wait --timeout 5m

      - name: Verify rollout
        run: |
          kubectl rollout status deployment/deploytracker \
            -n deploytracker --timeout=3m

      - name: Record deployment in deploytracker
        run: |
          K3S_IP=$(aws ssm get-parameter --name /deploytracker/k3s_server_ip --query Parameter.Value --output text)
          curl -f -X POST "http://${K3S_IP}:30080/api/v1/deployments" \
            -H "Content-Type: application/json" \
            -d '{
              "service_name": "deploytracker",
              "version": "${{ needs.build-and-push.outputs.image-tag }}",
              "environment": "production",
              "commit_sha": "${{ github.sha }}",
              "deployer": "github-actions",
              "commit_timestamp": "${{ github.event.workflow_run.created_at }}",
              "deployed_at": "'$(date -u +%Y-%m-%dT%H:%M:%SZ)'"
            }'
