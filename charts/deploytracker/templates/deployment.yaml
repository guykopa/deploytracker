apiVersion: apps/v1
kind: Deployment
metadata:
  name: deploytracker
  namespace: deploytracker
  labels:
    {{- include "deploytracker.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "deploytracker.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "deploytracker.labels" . | nindent 8 }}
    spec:
      serviceAccountName: deploytracker
      terminationGracePeriodSeconds: 30
      imagePullSecrets:
        - name: ecr-credentials
      nodeSelector:
        {{- toYaml .Values.nodeSelector.api | nindent 8 }}
      initContainers:
        - name: migrate
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["alembic", "upgrade", "head"]
          envFrom:
            - configMapRef:
                name: deploytracker-config
            - secretRef:
                name: deploytracker-secrets
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
      containers:
        - name: deploytracker
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          envFrom:
            - configMapRef:
                name: deploytracker-config
            - secretRef:
                name: deploytracker-secrets
          livenessProbe:
            httpGet:
              path: /health/live
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health/ready
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            {{- toYaml .Values.resources.api | nindent 12 }}
