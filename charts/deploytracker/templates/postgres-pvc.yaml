apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-data
  namespace: deploytracker
  labels:
    {{- include "deploytracker.postgresLabels" . | nindent 4 }}
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: {{ .Values.postgres.storageClass }}
  resources:
    requests:
      storage: {{ .Values.postgres.storage }}
