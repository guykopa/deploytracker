apiVersion: v1
kind: Service
metadata:
  name: deploytracker
  namespace: deploytracker
  labels:
    {{- include "deploytracker.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  selector:
    {{- include "deploytracker.selectorLabels" . | nindent 4 }}
  ports:
    - name: http
      protocol: TCP
      port: {{ .Values.service.port }}
      targetPort: http
      nodePort: {{ .Values.service.nodePort }}
