apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: deploytracker
  labels:
    {{- include "deploytracker.postgresLabels" . | nindent 4 }}
spec:
  serviceName: postgres
  replicas: 1
  selector:
    matchLabels:
      {{- include "deploytracker.postgresSelectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "deploytracker.postgresLabels" . | nindent 8 }}
    spec:
      nodeSelector:
        {{- toYaml .Values.nodeSelector.postgres | nindent 8 }}
      terminationGracePeriodSeconds: 60
      containers:
        - name: postgres
          image: {{ .Values.postgres.image }}
          imagePullPolicy: IfNotPresent
          ports:
            - name: postgres
              containerPort: 5432
              protocol: TCP
          env:
            - name: POSTGRES_DB
              value: deploytracker
            - name: POSTGRES_USER
              value: deploytracker
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: deploytracker-secrets
                  key: db_password
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
          livenessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - deploytracker
                - -d
                - deploytracker
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - deploytracker
                - -d
                - deploytracker
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            {{- toYaml .Values.resources.postgres | nindent 12 }}
      volumes:
        - name: postgres-data
          persistentVolumeClaim:
            claimName: postgres-data
