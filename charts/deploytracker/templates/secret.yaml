# The secret must be created manually before deployment:
# kubectl create secret generic deploytracker-secrets \
#   --namespace deploytracker \
#   --from-literal=db_password=$(aws ssm get-parameter \
#     --name /deploytracker/db_password \
#     --with-decryption \
#     --query Parameter.Value \
#     --output text) \
#   --from-literal=jwt_secret_key=$(aws ssm get-parameter \
#     --name /deploytracker/jwt_secret_key \
#     --with-decryption \
#     --query Parameter.Value \
#     --output text) \
#   --from-literal=admin_password=$(aws ssm get-parameter \
#     --name /deploytracker/admin_password \
#     --with-decryption \
#     --query Parameter.Value \
#     --output text)
apiVersion: v1
kind: Secret
metadata:
  name: deploytracker-secrets
  namespace: deploytracker
  labels:
    {{- include "deploytracker.labels" . | nindent 4 }}
type: Opaque
# Data is managed externally via AWS SSM — do not store values here.
# The keys `db_password`, `jwt_secret_key`, and `admin_password` must be present before deploying.
# data:
#   db_password: <base64-encoded-value>
#   jwt_secret_key: <base64-encoded-value>
#   admin_password: <base64-encoded-value>
