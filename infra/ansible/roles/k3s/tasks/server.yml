---
- name: Uninstall K3s server if already installed
  shell: /usr/local/bin/k3s-uninstall.sh
  args:
    removes: /usr/local/bin/k3s-uninstall.sh

- name: Install K3s server
  shell: |
    curl -sfL https://get.k3s.io | INSTALL_K3S_VERSION="{{ k3s_version }}" sh -s - server \
      --disable traefik \
      --disable servicelb \
      --write-kubeconfig-mode 644 \
      --node-label role=control \
      --tls-san {{ ansible_host }}
  args:
    creates: /usr/local/bin/k3s

- name: Wait for K3s to be ready
  wait_for:
    path: /var/lib/rancher/k3s/server/node-token
    timeout: 120

- name: Get K3s node token
  slurp:
    src: /var/lib/rancher/k3s/server/node-token
  register: k3s_node_token

- name: Store K3s token in SSM
  community.aws.ssm_parameter:
    name: /deploytracker/k3s_token
    value: "{{ k3s_node_token.content | b64decode | trim }}"
    string_type: SecureString
    region: eu-west-3
  delegate_to: localhost
  become: false

- name: Expose K3s token as fact
  set_fact:
    k3s_token: "{{ k3s_node_token.content | b64decode | trim }}"
